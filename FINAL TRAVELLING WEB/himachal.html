  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #cfcdcd;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .btn {
    position: relative;
    padding: 15px 40px;
    font-size: 18px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: transparent;
    border: none;
    cursor: pointer;
    z-index: 1;
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, #ff0066, #00ccff, #00ff99, #ffcc00);
    background-size: 300%;
    border-radius: 50px;
    z-index: -1;
    filter: blur(8px);
    opacity: 0.7;
    transition: 0.3s;
  }

  .btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #111;
    border-radius: 50px;
    z-index: -1;
  }

  .btn:hover::before {
    animation: glow 3s linear infinite;
    opacity: 1;
  }

  @keyframes glow {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
  }
</style>
